<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, viewport-fit=cover"
    />
    <meta name="theme-color" content="#000000" />
    <title>ZERINIX</title>
    <style>
      :root {
        color-scheme: dark;
        background: #000;
        color: #fff;
        font-family:
          Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont,
          "Segoe UI", sans-serif;
      }

      body {
        display: grid;
        min-height: 100vh;
        margin: 0;
        place-items: center;
        background:
          radial-gradient(circle at top right, rgba(45, 212, 191, 0.18), transparent 32%),
          #000;
      }

      main {
        width: min(100% - 48px, 420px);
        text-align: center;
      }

      .mark {
        display: inline-grid;
        height: 64px;
        width: 64px;
        place-items: center;
        border-radius: 20px;
        background: #fff;
        color: #000;
        font-weight: 900;
        letter-spacing: 0.12em;
      }

      h1 {
        margin: 24px 0 8px;
        font-size: 28px;
        letter-spacing: 0.08em;
      }

      p {
        margin: 0;
        color: #a1a1aa;
        line-height: 1.6;
      }
    </style>
  </head>
  <body>
    <main>
      <div class="mark">ZX</div>
      <h1>ZERINIX</h1>
      <p>Connect the native app to a production ZERINIX URL before release.</p>
    </main>
  </body>
</html>
